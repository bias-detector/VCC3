<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess the Number</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <h1>Guess the Number</h1>
        <p class="intro">
          Guess a number between 1 and 100. See if you can beat the computer!
        </p>
      </section>

      <div class="layout-container">
        <section class="card game">
          <h2>Play Game</h2>
          <button id="startBtn" class="btn primary">Start New Game</button>
          <div id="gameContent" class="game-content hidden">
            <p id="gameMessage">Think of a number between 1 and 100...</p>
            <div class="guess-area">
              <input id="guessInput" type="number" placeholder="Enter your guess" min="1" max="100" />
              <button id="guessBtn" class="btn primary">Guess</button>
            </div>
            <div id="result" class="result hidden"></div>
          </div>
        </section>

        <div class="sidebar">
          <section class="card metrics">
            <h2>Metrics</h2>
            <div class="cpu-display">
              <span>CPU:</span>
              <span id="cpuPercent" class="cpu-value">--</span>
            </div>
            <div class="mini-metrics">
              <div class="mini-row">
                <span>Scale monitor:</span>
                <span id="scaleEnabled">--</span>
              </div>
              <div class="mini-row">
                <span>Scale status:</span>
                <span id="scaleStatus">--</span>
              </div>
              <div class="mini-row">
                <span>Timer:</span>
                <span id="scaleTimer">--</span>
              </div>
            </div>
            <pre id="scaleMessage" class="output">Scale monitor status will appear here.</pre>
          </section>

          <section class="card stress">
            <h2>Stress Test</h2>
            <div class="stress-actions">
              <button id="stressStartBtn" class="btn danger">Start</button>
              <button id="stressStopBtn" class="btn secondary">Stop</button>
            </div>
            <pre id="stressOutput" class="output">Idle.</pre>
          </section>
        </div>
      </div>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
